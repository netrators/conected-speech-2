        // --- FUNCIONES DE UTILIDAD (Text to Speech) ---
        const speak = (text, rate = 0.9) => {
            if (!window.speechSynthesis) {
                console.error("Speech Synthesis no soportado en este navegador.");
                return;
            }
            // Cancelar cualquier audio previo
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = rate; // Un poco más lento para notar las conexiones
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        };

        const QuizSection = () => {

                    explanation: "La /n/ de 'Can' se une a la vocal de 'it' mediante catenación (Linking CV)."
                }
            ];

            const current = questions[currentStep];

            const handleCheck = () => {
                if (selectedOption === current.correct) setScore(score + 1);
                setIsEvaluated(true);
            };

            const next = () => {
                if (currentStep < questions.length - 1) {
                    setCurrentStep(currentStep + 1);
                    setSelectedOption(null);
                    setIsEvaluated(false);
                } else {
                    confetti({ particleCount: 150, spread: 60 });
                }
            };

            return (
                <div className="max-w-4xl mx-auto animate-fade-in pb-10">
                    <div className="bg-white p-12 md:p-16 rounded-[4rem] shadow-2xl border border-slate-100">
                        <div className="flex justify-between items-center mb-10">
                            <span className="text-sm font-black text-indigo-600 uppercase tracking-widest">Reto Auditivo {currentStep + 1} de {questions.length}</span>
                            <div className="px-4 py-1 bg-slate-100 rounded-full text-xs font-bold text-slate-400">Puntos: {score}</div>
                        </div>

                        <h3 className="text-3xl font-black text-slate-800 mb-10 leading-snug">{current.q}</h3>

                        <div className="grid gap-4 mb-10">
                            {current.options.map((opt, i) => (
                                <button 
                                    key={i}
                                    disabled={isEvaluated}
                                    onClick={() => setSelectedOption(i)}
                                    className={`p-6 rounded-2xl border-2 font-bold text-left transition-all ${
                                        isEvaluated 
                                        ? (i === current.correct ? 'border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm' : (selectedOption === i ? 'border-rose-500 bg-rose-50 text-rose-700' : 'border-slate-50 text-slate-300 opacity-60'))
                                        : (selectedOption === i ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-100 hover:border-indigo-200 text-slate-600')
                                    }`}
                                >
                                    <div className="flex justify-between items-center">
                                        <span>{opt}</span>
                                        {isEvaluated && i === current.correct && <i className="fa-solid fa-circle-check"></i>}
                                    </div>
                                </button>
                            ))}
                        </div>

                        {isEvaluated && (
                            <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: 'auto' }} className="mb-10 p-6 bg-indigo-50 rounded-2xl text-indigo-900 text-lg border border-indigo-100">
                                <div className="flex gap-4">
                                    <button onClick={() => speak(current.explanation)} className="text-indigo-400 text-xl"><i className="fa-solid fa-volume-high"></i></button>
                                    <p><strong>💡 Explicación:</strong> {current.explanation}</p>
                                </div>
                            </motion.div>
                        )}

                        <div className="flex justify-end">
                            {!isEvaluated ? (
                                <button 
                                    onClick={handleCheck}
                                    disabled={selectedOption === null}
                                    className={`px-10 py-4 rounded-full font-black text-lg transition-all ${selectedOption !== null ? 'bg-indigo-600 text-white shadow-lg hover:-translate-y-1' : 'bg-slate-200 text-slate-400'}`}
                                >
                                    Comprobar Respuesta
                                </button>
                            ) : (
                                <button 
                                    onClick={next}
                                    className="px-10 py-4 bg-slate-900 text-white rounded-full font-black text-lg hover:bg-black shadow-lg transition-all"
                                >
                                    {currentStep === questions.length - 1 ? 'Ver Resultados' : 'Siguiente Pregunta'}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ExamSection = () => {
            const [selectedId, setSelectedId] = useState(null);
            const [analysisMode, setAnalysisMode] = useState(false);
            const currentText = EXAM_RESOURCES.find(t => t.id === selectedId);

            const handleSpeechText = () => {
                speak(currentText.text, 0.85);
            };

            return (
                <div className="max-w-6xl mx-auto space-y-10 animate-fade-in pb-20">
                    <header className="text-center space-y-4">
                        <h2 className="text-5xl font-black text-slate-900">Fluency Exam Suite</h2>
                        <p className="text-xl text-slate-500 max-w-2xl mx-auto">Selecciona un texto para tu evaluación oral.</p>
                    </header>

                    {!selectedId ? (
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {EXAM_RESOURCES.map(ex => (
                                <button 
                                    key={ex.id} 
                                    onClick={() => setSelectedId(ex.id)}
                                    className="p-8 bg-white rounded-[2.5rem] border border-slate-200 hover:border-indigo-600 hover:shadow-2xl transition-all text-left group flex flex-col justify-between h-full"
                                >
                                    <div>
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                                <i className="fa-solid fa-file-invoice"></i>
                                            </div>
                                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-300 group-hover:text-indigo-200 transition-colors">ID: {ex.id}</span>
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-800 mb-3 group-hover:text-indigo-600 transition-colors">{ex.topic}</h3>
                                        <p className="text-sm text-slate-400 line-clamp-3 mb-6 leading-relaxed">{ex.text}</p>
                                    </div>
                                    <div className="flex items-center gap-2 pt-4 border-t border-slate-50">
                                        <span className="px-3 py-1 bg-slate-100 rounded-lg text-[10px] font-bold text-slate-500 uppercase">{ex.level}</span>
                                        <span className="text-[10px] font-bold text-indigo-400 ml-auto flex items-center gap-1 italic">Abrir <i className="fa-solid fa-chevron-right text-[8px]"></i></span>
                                    </div>
                                </button>
                            ))}
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl border border-slate-100 shadow-sm gap-4">
                                <button onClick={() => setSelectedId(null)} className="flex items-center gap-2 font-bold text-indigo-600 hover:translate-x-[-4px] transition-transform order-2 md:order-1">
                                    <i className="fa-solid fa-arrow-left"></i> Volver a la Lista
                                </button>
                                <div className="flex flex-wrap items-center gap-4 order-1 md:order-2">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-black text-slate-400 uppercase">Resaltar Conexiones:</span>
                                        <button 
                                            onClick={() => setAnalysisMode(!analysisMode)}
                                            className={`w-14 h-7 rounded-full transition-all relative ${analysisMode ? 'bg-indigo-600' : 'bg-slate-200'}`}
                                        >
                                            <div className={`w-5 h-5 bg-white rounded-full absolute top-1 transition-all ${analysisMode ? 'left-8' : 'left-1'}`}></div>
                                        </button>
                                    </div>
                                    <button 
                                        onClick={handleSpeechText}
                                        className="px-6 py-2 bg-indigo-100 text-indigo-600 rounded-full font-bold text-sm hover:bg-indigo-200 transition-all flex items-center gap-2"
                                    >
                                        <i className="fa-solid fa-volume-high"></i> Guía Auditiva
                                    </button>
                                </div>
                            </div>

                            <motion.div 
                                initial={{ opacity: 0, scale: 0.98 }}
                                animate={{ opacity: 1, scale: 1 }}
                                className="bg-white p-12 md:p-24 rounded-[4.5rem] shadow-[0_40px_100px_-20px_rgba(0,0,0,0.1)] border border-slate-100 relative overflow-hidden"
                            >
                                <div className="absolute top-12 left-1/2 -translate-x-1/2 opacity-[0.05] pointer-events-none">
                                    <i className="fa-solid fa-quote-left text-[14rem] text-indigo-600"></i>
                                </div>

                                <div className="text-center mb-16 relative z-10">
                                    <span className="text-indigo-600 font-black uppercase tracking-[0.2em] text-xs">Examen de Lectura Fluida</span>
                                    <h3 className="text-4xl font-black text-slate-800 mt-2">{currentText.topic}</h3>
                                </div>

                                <div className={`text-2xl md:text-4xl font-extrabold text-slate-800 leading-[1.8] md:leading-[2.2] text-center relative z-10 transition-all`}>
                                    {currentText.text.split(" ").map((word, i, arr) => {
                                        const next = arr[i+1];
                                        let linkType = null;
                                        
                                        if (analysisMode && next) {
                                            const lastChar = word.toLowerCase().replace(/[^a-z]/g, "").slice(-1);
                                            const firstChar = next.toLowerCase().replace(/[^a-z]/g, "").slice(0, 1);
                                            const vowels = "aeiou";
                                            const consonants = "bcdfghjklmnpqrstvwxyz";

                                            if (consonants.includes(lastChar) && vowels.includes(firstChar)) linkType = "cv";
                                            else if (vowels.includes(lastChar) && vowels.includes(firstChar)) linkType = "vv";
                                            else if (lastChar === firstChar && lastChar !== "") linkType = "gem";
                                        }

                                        return (
                                            <span key={i} className={`inline-block mr-3 md:mr-5 mb-2 transition-all cursor-pointer hover:text-indigo-600 ${linkType === 'cv' ? 'link-cv' : linkType === 'vv' ? 'link-vv' : linkType === 'gem' ? 'link-gem' : ''}`} onClick={() => speak(word)}>
                                                {word}
                                            </span>
                                        );
                                    })}
                                </div>

                                <div className="mt-24 pt-12 border-t border-slate-100 flex flex-col items-center gap-6 relative z-10">
                                    <p className="text-xs font-black text-slate-300 uppercase tracking-widest">Controles de Evaluación</p>
                                    <div className="flex flex-wrap justify-center gap-4">
                                        <button 
                                            onClick={() => confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } })}
                                            className="px-10 py-4 bg-emerald-500 text-white rounded-2xl font-black shadow-xl hover:bg-emerald-600 active:scale-95 transition-all flex items-center gap-3"
                                        >
                                            <i className="fa-solid fa-check-double"></i> Aprobar Lectura
                                        </button>
                                        <button className="px-10 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black border border-slate-200 hover:bg-slate-200 active:scale-95 transition-all">
                                            Reintentar <i className="fa-solid fa-rotate-right ml-2 text-xs"></i>
                                        </button>
                                    </div>
                                </div>
                            </motion.div>
                        </div>
                    )}
                </div>
            );
        };

        // --- APLICACIÓN PRINCIPAL ---

        function App() {
            const [activeTab, setActiveTab] = useState('theory');

            return (
                <div className="min-h-screen pb-32 pt-24 px-4 custom-scrollbar">
                    <Navbar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="max-w-7xl mx-auto pt-10">
                        <AnimatePresence mode="wait">
                            {activeTab === 'theory' && (
                                <motion.div key="theory" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }}>
                                    <TheoryModule />
                                </motion.div>
                            )}
                            {activeTab === 'lab' && (
                                <motion.div key="lab" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }}>
                                    <LabSection />
                                </motion.div>
                            )}
                            {activeTab === 'quiz' && (
                                <motion.div key="quiz" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }}>
                                    <QuizSection />
                                </motion.div>
                            )}
                            {activeTab === 'exam' && (
                                <motion.div key="exam" initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }}>
                                    <ExamSection />
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Navegación Móvil */}
                    <div className="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 glass-morphism px-4 py-2 rounded-full shadow-2xl z-[60] flex gap-2">
                        {[
                            { id: 'theory', icon: 'fa-book-open' },
                            { id: 'lab', icon: 'fa-flask-vial' },
                            { id: 'quiz', icon: 'fa-check-double' },
                            { id: 'exam', icon: 'fa-graduation-cap' }
                        ].map(t => (
                            <button 
                                key={t.id} 
                                onClick={() => setActiveTab(t.id)}
                                className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${activeTab === t.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}
                            >
                                <i className={`fa-solid ${t.icon}`}></i>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
